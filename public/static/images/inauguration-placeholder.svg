<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="800" viewBox="0 0 1920 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003a74;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#003666;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d91d0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="overlay" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#001a40;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#001a40;stop-opacity:0.7" />
    </linearGradient>
  </defs>
  <!-- Fond -->
  <rect width="1920" height="800" fill="url(#bg)"/>
  <!-- Motif décoratif -->
  <circle cx="200" cy="150" r="300" fill="#0d91d0" opacity="0.1"/>
  <circle cx="1700" cy="650" r="400" fill="#7dcaa5" opacity="0.08"/>
  <circle cx="960" cy="400" r="600" fill="#003666" opacity="0.15"/>
  <!-- Silhouettes personnes (simple représentation) -->
  <rect x="300" y="400" width="60" height="200" rx="30" fill="#a8b088" opacity="0.3"/>
  <circle cx="330" cy="375" r="35" fill="#a8b088" opacity="0.3"/>
  <rect x="420" y="380" width="60" height="220" rx="30" fill="#7dcaa5" opacity="0.35"/>
  <circle cx="450" cy="355" r="35" fill="#7dcaa5" opacity="0.35"/>
  <rect x="540" y="360" width="60" height="240" rx="30" fill="#a8b088" opacity="0.3"/>
  <circle cx="570" cy="335" r="35" fill="#a8b088" opacity="0.3"/>
  <rect x="1200" y="390" width="60" height="210" rx="30" fill="#a8b088" opacity="0.3"/>
  <circle cx="1230" cy="365" r="35" fill="#a8b088" opacity="0.3"/>
  <rect x="1320" y="370" width="60" height="230" rx="30" fill="#7dcaa5" opacity="0.35"/>
  <circle cx="1350" cy="345" r="35" fill="#7dcaa5" opacity="0.35"/>
  <rect x="1440" y="400" width="60" height="200" rx="30" fill="#a8b088" opacity="0.3"/>
  <circle cx="1470" cy="375" r="35" fill="#a8b088" opacity="0.3"/>
  <!-- Bannière centrale -->
  <rect x="560" y="200" width="800" height="180" rx="12" fill="rgba(0,54,102,0.85)" stroke="#0d91d0" stroke-width="2"/>
  <text x="960" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#7dcaa5">INAUGURATION</text>
  <text x="960" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white">BGFIBank CENTRAFRIQUE</text>
  <text x="960" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#a8b088">Bangui, République Centrafricaine</text>
  <!-- Sol/tapis -->
  <rect x="0" y="600" width="1920" height="200" fill="#002255" opacity="0.5"/>
  <!-- Logo BGFI stylisé -->
  <rect x="850" y="450" width="220" height="60" rx="8" fill="#0d91d0" opacity="0.4"/>
  <text x="960" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white">BGFI</text>
</svg>